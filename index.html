<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUCÍA_OS_98</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @font-face {
            font-family: 'Win98';
            src: url('https://fonts.cdnfonts.com/s/14890/MS-Sans-Serif.woff') format('woff');
        }

        body, html {
            margin: 0; padding: 0; height: 100%; overflow: hidden;
            background-color: #008080;
            /* RUTA RELATIVA DIRECTA AL ARCHIVO SUELTO */
            background-image: url("./fondo%20windows.png");
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            font-family: 'Win98', 'Tahoma', sans-serif;
            -webkit-font-smoothing: none;
        }

        .win98-window {
            box-shadow: inset 1px 1px #dfdfdf, inset -1px -1px #0a0a0a, inset 2px 2px #fff, inset -2px -2px #848484;
            background: #c0c0c0;
            position: absolute;
        }

        .win98-btn {
            box-shadow: inset 1px 1px #fff, inset -1px -1px #0a0a0a, inset 2px 2px #dfdfdf, inset -2px -2px #848484;
            background: #c0c0c0;
            cursor: pointer;
            user-select: none;
        }

        .win98-btn:active, .win98-btn.active {
            box-shadow: inset 1px 1px #0a0a0a, inset -1px -1px #fff, inset 2px 2px #848484, inset -2px -2px #dfdfdf;
            padding-top: 1px; padding-left: 1px;
        }

        .desktop-container {
            height: calc(100vh - 40px);
            overflow: hidden;
            position: relative;
            padding: 20px;
        }

        .desktop-icon {
            width: 100px; height: 110px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: start;
            text-align: center; cursor: pointer; user-select: none;
            position: absolute;
        }

        .desktop-icon span {
            color: white; text-shadow: 1px 1px black;
            padding: 2px 4px; margin-top: 4px; font-size: 10px;
            word-break: break-word; max-width: 95%;
            line-height: 1.1;
        }

        .desktop-icon:focus span { background-color: #000080; text-shadow: none; }

        .notepad-area {
            background: white;
            box-shadow: inset 1px 1px #848484, inset -1px -1px #dfdfdf, inset 2px 2px #0a0a0a, inset -2px -2px #fff;
            padding: 5px; font-family: 'Courier New', Courier, monospace;
            font-size: 13px; color: black; outline: none;
        }

        .acad-grid {
            background-color: #1a1a1a;
            background-image: linear-gradient(rgba(0, 255, 0, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 255, 0, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .start-menu {
            position: fixed; bottom: 40px; left: 2px; width: 260px;
            z-index: 9999; border: 2px solid #fff;
            border-right-color: #0a0a0a; border-bottom-color: #0a0a0a;
        }

        .start-menu-sidebar {
            width: 35px; background: linear-gradient(to top, #000080, #1084d0);
            writing-mode: vertical-lr; transform: rotate(180deg);
            padding: 10px 0; color: #fff; font-weight: bold; font-size: 18px;
            display: flex; align-items: center; justify-content: center;
        }

        ::-webkit-scrollbar { width: 16px; height: 16px; }
        ::-webkit-scrollbar-track { background: #dfdfdf; box-shadow: inset 1px 1px #848484; }
        ::-webkit-scrollbar-thumb { background: #c0c0c0; box-shadow: inset 1px 1px #fff, inset -1px -1px #0a0a0a; border: 1px solid #848484; }
        
        .prog-bar-container { background: #dfdfdf; box-shadow: inset 1px 1px #848484; height: 12px; position: relative; }
        .prog-bar-fill { background: #000080; height: 100%; transition: width 0.3s; }

        .ms-cell {
            width: 24px; height: 24px;
            background: #c0c0c0;
            border: 2px solid;
            border-color: #fff #848484 #848484 #fff;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 14px;
            cursor: pointer; user-select: none;
        }
        .ms-cell.revealed {
            border: 1px solid #848484;
            background: #c0c0c0;
        }
        .ms-cell.mine { background: red; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const IconFolder = ({ color = "#ffd700" }) => (
            <svg width="32" height="32" viewBox="0 0 32 32"><path d="M2 6H12L14 8H30V26H2V6Z" fill="#ffff00" stroke="black" /><path d="M3 9H29V25H3V9Z" fill={color} /></svg>
        );
        const IconPDF = () => (
            <svg width="32" height="32" viewBox="0 0 32 32"><rect x="6" y="2" width="20" height="28" fill="white" stroke="black" /><rect x="8" y="18" width="16" height="8" fill="#ff0000" /><text x="10" y="24" fontSize="6" fill="white" fontWeight="bold">PDF</text></svg>
        );
        const IconTXT = () => (
            <svg width="32" height="32" viewBox="0 0 32 32"><rect x="6" y="2" width="20" height="28" fill="white" stroke="black" /><line x1="10" y1="8" x2="22" y2="8" stroke="#848484" /><line x1="10" y1="12" x2="22" y2="12" stroke="#848484" /><line x1="10" y1="16" x2="22" y2="16" stroke="#848484" /></svg>
        );
        const IconMP4 = () => (
            <svg width="32" height="32" viewBox="0 0 32 32"><rect x="4" y="4" width="24" height="24" fill="#000080" stroke="black" /><circle cx="16" cy="16" r="8" fill="#c0c0c0" /><path d="M14 12V20L19 16L14 12Z" fill="#000080" /></svg>
        );

        const MovableWindow = ({ id, title, content, isActive, onActivate, onClose, initialPos, width }) => {
            const [pos, setPos] = useState(initialPos || { x: 50, y: 50 });
            const [dragging, setDragging] = useState(false);
            const dragOffset = useRef({ x: 0, y: 0 });

            const handleMouseDown = (e) => {
                if (e.target.closest('.win98-btn')) return;
                setDragging(true); onActivate(id);
                dragOffset.current = { x: e.clientX - pos.x, y: e.clientY - pos.y };
            };

            useEffect(() => {
                const handleMouseMove = (e) => { if (dragging) setPos({ x: e.clientX - dragOffset.current.x, y: e.clientY - dragOffset.current.y }); };
                const handleMouseUp = () => setDragging(false);
                if (dragging) { window.addEventListener('mousemove', handleMouseMove); window.addEventListener('mouseup', handleMouseUp); }
                return () => { window.removeEventListener('mousemove', handleMouseMove); window.removeEventListener('mouseup', handleMouseUp); };
            }, [dragging]);

            return (
                <div className="win98-window flex flex-col shadow-xl" style={{ left: pos.x, top: pos.y, zIndex: isActive ? 500 : 100, width: width || '450px' }} onMouseDown={() => onActivate(id)}>
                    <div className={`flex justify-between items-center p-1 cursor-default ${isActive ? 'bg-[#000080]' : 'bg-[#848484]'} text-white text-[11px] font-bold`} onMouseDown={handleMouseDown}>
                        <span className="ml-1 select-none">{title}</span>
                        <div className="flex gap-1">
                             <button className="win98-btn w-4 h-4 text-black text-[10px] flex items-center justify-center font-bold">_</button>
                             <button onClick={(e) => { e.stopPropagation(); onClose(id); }} className="win98-btn w-4 h-4 text-black text-xs leading-none flex items-center justify-center hover:bg-red-500 hover:text-white">×</button>
                        </div>
                    </div>
                    <div className="bg-[#c0c0c0] border m-[2px] overflow-auto max-h-[85vh] min-h-[150px]">{content}</div>
                </div>
            );
        };

        const Notepad = ({ text }) => (
            <div className="flex flex-col bg-[#c0c0c0] h-full">
                <div className="flex gap-3 px-2 py-1 text-[11px] border-b border-white"><span><u>A</u>rchivo</span><span><u>E</u>dición</span><span><u>F</u>ormato</span><span>Ay<u>u</u>da</span></div>
                <div className="notepad-area m-1 flex-1 min-h-[250px] whitespace-pre-wrap select-text overflow-y-scroll">{text}</div>
            </div>
        );

        const AutoCAD = () => {
            const [history, setHistory] = useState([
                'Press Enter', 
                'Comandos disponibles: about, skills, proyectos, contacto, random, cafe, clear.'
            ]);
            const [input, setInput] = useState('');
            const logEndRef = useRef(null);
            const randomQuotes = [
                "Tengo un perrito que se llama Ramón",
                "Me da grima el ruido de alguien rascando la tela",
                "Esta web la hice con IA",
                "Tengo hambre TODO el tiempo",
                "Soy de Cordoba, Argentina. No digo ni \"che\" ni \"boludo\""
            ];
            
            const commands = {
                'help': "Comandos disponibles: about, skills, proyectos, contacto, random, cafe, clear.",
                'about': "Arquitecta & Content Creator. Creativa y culo inquieto. Siempre aprendiendo cosas nuevas.",
                'skills': "Herramientas de Arquitectura: AutoCAD, SketchUp, Revit, Rhino 3D, Diseño Espacial, Arquitectura efimera, Interiorismo. | Herramientas de Creación: Edición de video (Premiere/Capcut), Diseño grafico y Retoque de fotografía (Adobe Creative Suite), Diseño sonoro (Ableton y Protools) Storytelling, Estrategia en Redes Sociales.",
                'random': () => randomQuotes[Math.floor(Math.random() * randomQuotes.length)],
                'contacto': "¡Trabajemos juntos! Email: [luciaisabelpagan@gmail.com] | Instagram/TikTok: [@luciaisabelpagan]",
                'cafe': "  c[☕]   <- Aca tenes tu café virtual. ¡Infaltable para terminar las entregas de proyectos y editar videos hasta la madrugada!",
                'mate': "  m[🧉]   <- Aca tenes tu mate virtual. Porque claro, Argentina darling. Pone la pava que nos tomamos un matecito y charlamos de como puedo ayudarte en tus proyectos :) ",
                'echo': "Hola",
                'clear': "CLEAR"
            };

            const handleCommand = (e) => {
                if (e.key === 'Enter') {
                    const cmd = input.toLowerCase().trim();
                    
                    if (cmd === 'clear') {
                        setHistory([]);
                    } else if (commands[cmd]) {
                        const res = typeof commands[cmd] === 'function' ? commands[cmd]() : commands[cmd];
                        setHistory(prev => [...prev, `Command: ${input}`, res]);
                    } else if (cmd !== '') {
                        setHistory(prev => [...prev, `Command: ${input}`, "Comando desconocido. Escribe 'help' para ver las opciones."]);
                    }
                    
                    setInput('');
                    setTimeout(() => logEndRef.current?.scrollIntoView({ behavior: 'smooth' }), 50);
                }
            };

            return (
                <div className="h-[450px] flex flex-col bg-[#1a1a1a]">
                    <div className="flex-1 acad-grid relative flex items-center justify-center">
                        <div className="z-10 bg-black/40 p-4 border border-green-500/30 backdrop-blur-sm flex gap-4 items-center">
                            <div className="w-24 h-24 border-2 border-green-500 overflow-hidden relative"><img src="https://drive.google.com/thumbnail?id=1dY01lBVdEq8QUD2EuIBYlrJxpKgkZ_c5&sz=w400" className="w-full h-full object-cover" /></div>
                            <div className="text-green-500 font-mono"><p className="font-bold text-sm">LUCÍA_PAGÁN.dwg</p><p className="text-[10px] mt-2 opacity-60 italic">SYSTEM_READY_</p></div>
                        </div>
                    </div>
                    <div className="h-32 bg-black text-green-500 font-mono text-xs p-2 overflow-y-auto border-t-2 border-gray-700">
                        {history.map((h, i) => <div key={i}>{h}</div>)}
                        <div className="flex"><span>Command: </span><input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={handleCommand} className="bg-transparent outline-none flex-1 ml-1 text-white" autoFocus /></div>
                        <div ref={logEndRef}></div>
                    </div>
                </div>
            );
        };

        const FolderView = ({ items, onOpen }) => (
            <div className="p-6 grid grid-cols-3 gap-6 min-w-[400px] bg-white min-h-[300px] shadow-inner">
                {items.map(item => (
                    <div key={item.id} onDoubleClick={() => onOpen(item)} className="flex flex-col items-center cursor-pointer group">
                        <div className="group-hover:opacity-80 scale-150 mb-4">{item.icon || <IconPDF />}</div>
                        <span className="text-[11px] text-center bg-transparent group-hover:bg-[#000080] group-hover:text-white px-2 font-mono">{item.title}</span>
                    </div>
                ))}
            </div>
        );

        const Buscaminas = () => {
            const [grid, setGrid] = useState([]);
            const [gameOver, setGameOver] = useState(false);
            const [win, setWin] = useState(false);
            const [minesLeft, setMinesLeft] = useState(10);
            const rows = 9, cols = 9, mines = 10;

            const initGame = () => {
                let newGrid = Array(rows).fill().map(() => Array(cols).fill({ isMine: false, isRevealed: false, isFlagged: false, neighborMines: 0 }));
                let minesPlaced = 0;
                while (minesPlaced < mines) {
                    let r = Math.floor(Math.random() * rows);
                    let c = Math.floor(Math.random() * cols);
                    if (!newGrid[r][c].isMine) {
                        newGrid[r][c] = { ...newGrid[r][c], isMine: true };
                        minesPlaced++;
                    }
                }
                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        if (!newGrid[r][c].isMine) {
                            let count = 0;
                            for (let i = -1; i <= 1; i++) {
                                for (let j = -1; j <= 1; j++) {
                                    if (r+i >= 0 && r+i < rows && c+j >= 0 && c+j < cols && newGrid[r+i][c+j].isMine) count++;
                                }
                            }
                            newGrid[r][c].neighborMines = count;
                        }
                    }
                }
                setGrid(newGrid); setGameOver(false); setWin(false); setMinesLeft(mines);
            };

            useEffect(() => { initGame(); }, []);

            const revealCell = (r, c) => {
                if (gameOver || win || grid[r][c].isRevealed || grid[r][c].isFlagged) return;
                let newGrid = [...grid.map(row => [...row])];
                if (newGrid[r][c].isMine) {
                    newGrid[r][c].isRevealed = true;
                    setGrid(newGrid); setGameOver(true); return;
                }
                const stack = [[r, c]];
                while (stack.length > 0) {
                    const [currR, currC] = stack.pop();
                    if (!newGrid[currR][currC].isRevealed) {
                        newGrid[currR][currC].isRevealed = true;
                        if (newGrid[currR][currC].neighborMines === 0) {
                            for (let i = -1; i <= 1; i++) {
                                for (let j = -1; j <= 1; j++) {
                                    if (currR+i >= 0 && currR+i < rows && currC+j >= 0 && currC+j < cols) stack.push([currR+i, currC+j]);
                                }
                            }
                        }
                    }
                }
                setGrid(newGrid);
                let hiddenSafe = 0;
                for (let i=0; i<rows; i++) for(let j=0; j<cols; j++) if(!newGrid[i][j].isRevealed && !newGrid[i][j].isMine) hiddenSafe++;
                if(hiddenSafe === 0) setWin(true);
            };

            const toggleFlag = (e, r, c) => {
                e.preventDefault();
                if (gameOver || win || grid[r][c].isRevealed) return;
                let newGrid = [...grid.map(row => [...row])];
                newGrid[r][c].isFlagged = !newGrid[r][c].isFlagged;
                setGrid(newGrid); setMinesLeft(minesLeft + (newGrid[r][c].isFlagged ? -1 : 1));
            };

            const colors = ['#0000ff', '#008000', '#ff0000', '#000080', '#800000', '#008080', '#000000', '#808080'];

            return (
                <div className="flex flex-col items-center p-2 bg-[#c0c0c0]">
                    <div className="flex justify-between items-center w-full bg-[#c0c0c0] border-[2px] border-[#848484] border-t-[#848484] border-l-[#848484] border-r-[#fff] border-b-[#fff] p-1 mb-2 shadow-inner">
                        <div className="bg-black text-red-500 font-mono text-xl px-1 border-2 border-[#848484] border-b-[#fff] border-r-[#fff] min-w-[40px] text-center">{minesLeft.toString().padStart(3, '0')}</div>
                        <button className="win98-btn w-8 h-8 flex items-center justify-center text-xl" onClick={initGame}>{gameOver ? '😵' : win ? '😎' : '🙂'}</button>
                        <div className="bg-black text-red-500 font-mono text-xl px-1 border-2 border-[#848484] border-b-[#fff] border-r-[#fff] min-w-[40px] text-center">000</div>
                    </div>
                    <div className="border-[3px] border-[#848484] border-b-[#fff] border-r-[#fff] bg-[#c0c0c0]">
                        {grid.map((row, r) => (
                            <div key={r} className="flex">
                                {row.map((cell, c) => (
                                    <div key={`${r}-${c}`} className={`ms-cell ${cell.isRevealed ? 'revealed' : ''} ${(gameOver && cell.isMine && !cell.isFlagged) ? 'revealed' : ''}`} onClick={() => revealCell(r, c)} onContextMenu={(e) => toggleFlag(e, r, c)} style={{ color: cell.isRevealed && cell.neighborMines > 0 ? colors[cell.neighborMines - 1] : 'black' }}>
                                        {(cell.isRevealed || (gameOver && cell.isMine)) && cell.isMine ? '💣' : ''}
                                        {cell.isRevealed && !cell.isMine && cell.neighborMines > 0 ? cell.neighborMines : ''}
                                        {!cell.isRevealed && cell.isFlagged ? '🚩' : ''}
                                    </div>
                                ))}
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const PaintApp = () => {
            const canvasRef = useRef(null);
            const [isDrawing, setIsDrawing] = useState(false);
            const [color, setColor] = useState('#000000');
            const [brushSize, setBrushSize] = useState(3);

            const loadBackground = () => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                const img = new Image();
                img.crossOrigin = "Anonymous";
                // RUTA RELATIVA DIRECTA
                img.src = "./boceto%20escenario.jpg";
                
                img.onload = () => {
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                };
            };

            useEffect(() => { loadBackground(); }, []);

            const startDrawing = ({ nativeEvent }) => {
                const { offsetX, offsetY } = nativeEvent;
                const ctx = canvasRef.current.getContext('2d');
                ctx.beginPath(); ctx.moveTo(offsetX, offsetY); ctx.strokeStyle = color; ctx.lineWidth = brushSize; ctx.lineCap = 'round'; ctx.lineJoin = 'round'; setIsDrawing(true);
            };

            const draw = ({ nativeEvent }) => {
                if (!isDrawing) return;
                const { offsetX, offsetY } = nativeEvent;
                const ctx = canvasRef.current.getContext('2d');
                ctx.lineTo(offsetX, offsetY); ctx.stroke();
            };

            const clearCanvas = () => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                loadBackground();
            };

            const colors = ['#000000', '#808080', '#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff', '#ffffff'];

            return (
                <div className="flex flex-col h-[450px] bg-[#c0c0c0]">
                    <div className="flex gap-3 px-2 py-1 text-[11px] border-b border-white"><span><u>A</u>rchivo</span><span><u>E</u>dición</span><span><u>V</u>er</span><span>I<u>m</u>agen</span><span><u>O</u>pciones</span><span>A<u>y</u>uda</span></div>
                    <div className="flex flex-1 overflow-hidden m-1 gap-1">
                        <div className="w-14 shrink-0 flex flex-col gap-1">
                            <div className="grid grid-cols-2 gap-[2px] bg-[#c0c0c0] p-1 border-t-2 border-l-2 border-white border-r-2 border-b-2 border-gray-600 shadow-sm">
                                <button className="win98-btn h-6 flex items-center justify-center text-xs">✏️</button><button className="win98-btn h-6 flex items-center justify-center text-xs bg-gray-300 shadow-inner">🖌️</button>
                                <button className="win98-btn h-6 flex items-center justify-center text-xs">🪣</button><button className="win98-btn h-6 flex items-center justify-center text-xs">🧽</button>
                                <button className="win98-btn h-6 flex items-center justify-center text-xs">A</button><button className="win98-btn h-6 flex items-center justify-center text-xs">🔍</button>
                            </div>
                            <button className="win98-btn px-1 py-2 text-[9px] font-bold mt-auto border-2 border-gray-500 leading-tight" onClick={clearCanvas}>Limpiar<br/>Lienzo</button>
                        </div>
                        <div className="flex-1 bg-white border-2 border-gray-600 shadow-inner cursor-crosshair overflow-hidden relative">
                            <canvas ref={canvasRef} width={600} height={400} onMouseDown={startDrawing} onMouseMove={draw} onMouseUp={() => setIsDrawing(false)} onMouseLeave={() => setIsDrawing(false)} className="w-full h-full touch-none" />
                        </div>
                    </div>
                    <div className="h-12 flex items-center p-1 gap-2 border-t-2 border-white bg-[#c0c0c0]">
                        <div className="w-8 h-8 border-2 border-gray-600 shadow-inner bg-white relative shrink-0">
                            <div className="absolute top-1 left-1 w-4 h-4 border border-gray-500 z-10" style={{backgroundColor: color}}></div>
                            <div className="absolute bottom-1 right-1 w-4 h-4 border border-gray-500 bg-white"></div>
                        </div>
                        <div className="flex flex-wrap gap-[2px] h-8 max-w-[150px] border-2 border-gray-600 p-[1px] shadow-inner bg-[#c0c0c0]">
                            {colors.map(c => (<button key={c} className={`w-[14px] h-[14px] border border-gray-400 ${color === c ? 'border-black border-2 shadow-inner' : 'hover:border-white'}`} style={{ backgroundColor: c }} onClick={() => setColor(c)}></button>))}
                        </div>
                    </div>
                </div>
            );
        };

        const SystemLog = () => {
            const [logs, setLogs] = useState([]);
            const endRef = useRef(null);
            
            useEffect(() => {
                const initialSequence = [
                    "C:\\WINDOWS\\SYSTEM32> Iniciar volcado de memoria de diseño...",
                    "> Comando: REGENERAR_CREATIVIDAD... OK.",
                    "> Error: Falta de rigor estratégico detectada. Corrigiendo cimientos...",
                    { type: 'progress', text: "> Renderizando atmósfera sonora para [Proyecto]...", progress: 0 },
                    "> Aviso: La escala de la idea supera el presupuesto. Optimizando recursos sin perder estética."
                ];
                
                setTimeout(() => setLogs(prev => [...prev, initialSequence[0]]), 300);
                setTimeout(() => setLogs(prev => [...prev, initialSequence[1]]), 1500);
                setTimeout(() => setLogs(prev => [...prev, initialSequence[2]]), 3000);
                setTimeout(() => setLogs(prev => [...prev, initialSequence[3]]), 5000);
                setTimeout(() => setLogs(prev => prev.map(l => l.type === 'progress' ? { ...l, progress: 100 } : l)), 6500);
                setTimeout(() => setLogs(prev => [...prev, initialSequence[4]]), 8000);

                const thoughts = [
                    "WARNING: Nivel de cafeína críticamente bajo.",
                    "ERROR: El cliente pidió el logo más grande.",
                    "Buscando inspiración en Pinterest... TIMEOUT",
                    "Ejecutando script de creatividad estructural...",
                    "Renderizando en segundo plano (ETA: 45 años)",
                    "Pensamiento: ¿Y si pinto el techo de negro?",
                    "Optimizando polígonos en AutoCAD...",
                    "Resolviendo conflicto de flujo de trabajo..."
                ];

                const interval = setInterval(() => {
                    const newLog = thoughts[Math.floor(Math.random() * thoughts.length)];
                    setLogs(prev => [...prev, `[${new Date().toLocaleTimeString()}] ${newLog}`]);
                }, 10000); 

                return () => clearInterval(interval);
            }, []);

            useEffect(() => {
                endRef.current?.scrollIntoView({ behavior: "smooth" });
            }, [logs]);

            return (
                <div className="h-[300px] bg-black text-[#00ff00] font-mono text-[10px] p-3 overflow-y-auto shadow-inner">
                    {logs.map((l, i) => {
                        if (typeof l === 'string') return <div key={i} className="mb-2">{l}</div>;
                        else if (l.type === 'progress') return (
                            <div key={i} className="mb-2 w-full mt-2">
                                <div>{l.text}</div>
                                <div className="w-full bg-gray-800 h-3 mt-1 border border-gray-600 p-[1px]"><div className="bg-[#00ff00] h-full transition-all duration-1000" style={{ width: `${l.progress}%` }}></div></div>
                                <div className="text-right mt-1 opacity-80">{l.progress}% completo.</div>
                            </div>
                        );
                    })}
                    <div ref={endRef}></div>
                </div>
            );
        };

        function App() {
            const [windows, setWindows] = useState([]); 
            const [activeId, setActiveId] = useState(null); 
            const [isStartOpen, setIsStartOpen] = useState(false);
            const [alertMsg, setAlertMsg] = useState(null);

            const triggerAlert = () => {
                const dilemmas = [
                    "La escala supera el presupuesto asignado. ¿Proceder de todos modos?",
                    "El render ha fallado después de 6 horas continuas. ¿Desea llorar?",
                    "Conflicto de versiones: 'Final_Final_Bueno_EsteSi.dwg' está corrupto.",
                    "El cliente sugiere usar Comic Sans para la rotulación de la fachada.",
                    "ERROR 404: Inspiración no encontrada. Por favor, reinicie el sistema."
                ];
                const msg = dilemmas[Math.floor(Math.random() * dilemmas.length)];
                try { const audio = new Audio('https://www.myinstants.com/media/sounds/erro.mp3'); audio.play(); } catch(e) {}
                setAlertMsg(msg);
            };

            const openWin = (item) => {
                if (windows.find(w => w.id === item.id)) { setActiveId(item.id); return; }
                let content, width = '450px', title = item.title;

                if (item.id === 'f_alert') { triggerAlert(); return; }
                else if (item.id === 'paint') { content = <PaintApp />; width = "600px"; }
                else if (item.id === 'syslog') { content = <SystemLog />; width = "450px"; }
                else if (item.id === 'buscaminas') { content = <Buscaminas />; width = "260px"; }
                else if (item.id === 'f_pc') { content = <FolderView items={[{id:'c_drive', title:'C:', icon:<div className="text-3xl">💽</div>}]} onOpen={()=>{}} />; width="400px"; }
                else if (item.id === 'f_ie') {
                    content = (
                        <div className="p-4 bg-white flex flex-col items-center">
                            <img src="https://media1.giphy.com/media/v1.Y2lkPTc5MGI3NjExbXFqYTVid3RoY3l1M2o0N2Q5MWRydmpkMjhlajFybW11cWsxM3lsZSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/NV4cSrRYXXwfUcYnua/giphy.gif" className="max-w-full border border-gray-400" />
                            <p className="mt-4 font-bold text-lg font-mono">MULTISKILLED</p>
                        </div>
                    );
                    width = "500px";
                }
                else if (item.id === 'f_trash') { content = <FolderView items={[]} onOpen={openWin} />; width = "500px"; }
                else if (item.id === 'f_cimientos') {
                    content = <FolderView items={[
                        { id: 'p_carmen_id', title: 'Carmen_Lillo_identidad.pdf', type: 'pdf', src: './Carmen%20Lillo_identidad%20visual.pdf' },
                        { id: 'p_metal_id', title: 'IDEAS_METALMADFEST.pdf', type: 'pdf', src: './IDEAS%20METALMADFEST.pdf' },
                        { id: 'p_viper_epk', title: 'LADY_VIPER_EPK.pdf', type: 'pdf', src: './LADY%20VIPER_EPK.pdf' },
                        { id: 'p_vsg_doc', title: 'VIAJANDO_SIN_GUION.pdf', type: 'pdf', src: './VIAJANDO%20SIN%20GUION.pdf' }
                    ]} onOpen={openWin} />; width = "550px";
                } 
                else if (item.id === 'f_estructura') {
                    content = <FolderView items={[
                        { id: 'p_mapa_remix', title: 'MAPA_STUDIOS_REMIX.pdf', type: 'pdf', src: './MAPA%20STUDIOS%20REMIX_FINAL.pdf' },
                        { id: 'p_oatly_v32', title: 'Oatly_V32_ESTE_SI.pdf', type: 'pdf', src: './Oatly%20V32_ESTE%20SI.pdf' },
                        { id: 'v_oatly_reel', title: 'OATLY_REEL_PRUEBA.mp4', type: 'video', src: './OATLY%20REEL%20PRUEBA.mp4', icon: <IconMP4 /> },
                        { id: 'p_oddliquor', title: 'ODDLIQUOR_JOYESLAVA.pdf', type: 'pdf', src: './ODDLIQUOR_JOYESLAVA.pdf' }
                    ]} onOpen={openWin} />; width = "550px";
                }
                else if (item.id === 'f_instalaciones') {
                    content = <FolderView items={[
                        { id: 'v_carmen_charm', title: 'Carmen_Lillo_Charm.mp4', type: 'video', src: './Carmen%20Lillo_Charm.mp4', icon: <IconMP4 /> },
                        { id: 'v_metal_fest', title: 'METALMAD_FEST.mp4', type: 'video', src: './METALMAD%20FEST.mp4', icon: <IconMP4 /> },
                        { id: 'v_mapa_riv', title: 'mapa_estudios_riverland.mp4', type: 'video', src: './mapa%20estudios%20+%20riverland.mp4', icon: <IconMP4 /> },
                        { id: 'v_santa_riv', title: 'Santamarta_Riverland.mp4', type: 'video', src: './Santamarta_Riverland.mp4', icon: <IconMP4 /> }
                    ]} onOpen={openWin} />; width = "550px";
                }
                else if (item.id === 'f_pm') {
                    content = <Notepad text={`GESTIÓN DE PROYECTOS TRANSVERSAL\n\nMi experiencia gestionando proyectos de arquitectura. Sé hacer cosas bonitas, pero también sé manejar presupuestos, proveedores y fechas de entrega sin entrar en pánico.`} />;
                }
                else if (item.id === 'manifiesto') {
                    content = <Notepad text={`MANIFIESTO\n\nHABITAR EL CAMBIO\n\nYo no estudie publicidad pero si te pones a pensar, realmente Le Corbusier no estudió arquitectura...\n\nEmpecé mi carrera entre planos y estructuras. Pero en el camino entendí que lo que más me fascina no es el edificio terminado, sino el proceso de habitar el espacio que hay entre las ideas.\n\nHace un tiempo decidí aplicar mi propia "demolición controlada": dejé la seguridad de un trabajo estable para invertir en lo que realmente me mueve: Creatividad.\n\nMe reconvertí no porque estuviera perdida, sino porque soy una inquieta crónica. Entendí que la arquitectura no es solo levantar muros, es diseñar sistemas, narrativas y experiencias, ya sea en un camión en el Riverland o en unos visuales para la Joy Eslava.\n\nMi stack personal es híbrido:\n\nArquitectura: Me dio el rigor técnico, el criterio estético, la gestión de presupuestos y la capacidad de no entrar en pánico ante una entrega.\n\nCreadora por instinto: Desde siempre fui la amiga plasta que quiere que hagamos un video para los 15 años de alguna del grupo, la que planificaba los actos y quería coreaografiar los bailes. Si tenia que hacer un proyecto para Musica o Arte, lo daba TODO.\n\nAprendiz por vocación: Invertir en mi formación en CANELA fue el giro que mi vida necesitaba para entender que el diseño, como la vida, es un Work In Progress constante.\n\nSoy Lucía. Arquitecta reconvertida, creadora inquieta y experta en encontrar la belleza en las contradicciones.`} />;
                }
                else if (item.type === 'pdf') { content = <iframe src={item.src} className="w-full h-[650px]" frameBorder="0"></iframe>; width = '750px'; }
                else if (item.type === 'video') { 
                    content = (
                        <div className="bg-black p-1 flex justify-center">
                            <video controls autoPlay className="w-full max-h-[400px]">
                                {/* RUTA RELATIVA PARA EL VIDEO */}
                                <source src={item.src} type="video/mp4" />
                                Tu navegador no soporta video.
                            </video>
                        </div>
                    ); 
                    width = '600px'; 
                }
                else if (item.type === 'img') { content = <img src={item.src} className="w-full h-auto" />; width = '600px'; }
                else if (item.type === 'txt') { content = <Notepad text={item.text} />; }
                else if (item.id === 'acad') { content = <AutoCAD />; width = '650px'; }

                const newPos = { x: 80 + (windows.length * 30), y: 80 + (windows.length * 30) };
                setWindows([...windows, { ...item, content, width, initialPos: newPos, title }]);
                setActiveId(item.id); setIsStartOpen(false);
            };

            const closeWin = (id) => { setWindows(windows.filter(w => w.id !== id)); if (activeId === id) setActiveId(null); };

            useEffect(() => { 
                openWin({ id: 'f_alert', title: 'Dilemas.exe', type: 'app' }); 
                openWin({ id: 'syslog', title: 'System_Log.exe', type: 'app' }); 
            }, []);

            const desktopItems = useMemo(() => [
                { id: 'f_pc', title: 'Mi PC', icon: <div className="text-4xl">💻</div>, x: 40, y: 30 },
                { id: 'f_trash', title: 'Papelera', icon: <div className="text-4xl">🗑️</div>, x: 40, y: 150 },
                { id: 'f_ie', title: 'Internet Explorer', icon: <div className="text-4xl">🌐</div>, x: 40, y: 280 },
                { id: 'f_cimientos', title: 'LOS CIMIENTOS', icon: <IconFolder color="#3b82f6" />, x: 200, y: 80 },
                { id: 'f_estructura', title: 'LA ESTRUCTURA', icon: <IconFolder color="#10b981" />, x: 150, y: 400 },
                { id: 'f_instalaciones', title: 'INSTALACIONES', icon: <IconFolder color="#ec4899" />, x: 350, y: 200 },
                { id: 'f_pm', title: 'PROJECT MGMT', icon: <IconFolder color="#f59e0b" />, x: 500, y: 50 },
                { id: 'manifiesto', title: 'Manifiesto.txt', icon: <IconTXT />, x: 480, y: 350 },
                { id: 'acad', title: 'AutoCAD.exe', icon: <img src="https://drive.google.com/thumbnail?id=1ppXe5M8uk-1dQfWkLY9-GwF-vKxmzTYe&sz=w100" className="w-11 h-11 object-contain drop-shadow-[1px_1px_1px_rgba(0,0,0,0.8)]" alt="AutoCAD" />, x: 650, y: 120 },
                { id: 'paint', title: 'Paint.exe', icon: <div className="text-4xl">🎨</div>, x: 780, y: 30 },
                { id: 'syslog', title: 'System_Log.exe', icon: <div className="text-4xl">🖧</div>, x: 600, y: 450 },
                { id: 'f_alert', title: 'Dilemas.exe', icon: <div className="text-4xl">⚠️</div>, x: 820, y: 400 },
                { id: 'buscaminas', title: 'Buscaminas.exe', icon: <div className="text-4xl">💣</div>, x: 220, y: 550 },
                { id: 'img_quien', title: 'QUIEN_ES_LUCIA.png', src: './QUIEN%20ES%20LUCIA.png', type:'img', icon: <div className="text-4xl">🖼️</div>, x: 400, y: 280 },
                { id: 'vid_arq', title: 'arquitecta_se_ofrece.mp4', src: './arquitecta%20se%20ofrece.mp4', type: 'video', icon: <IconMP4 />, x: 720, y: 550 }
            ], []);

            return (
                <div className="w-full h-full relative overflow-hidden" onClick={() => setIsStartOpen(false)}>
                    <div className="desktop-container">
                        {desktopItems.map(item => (
                            <div key={item.id} className="desktop-icon" style={{ left: item.x, top: item.y }} onDoubleClick={() => openWin(item)} onClick={(e) => e.stopPropagation()}>
                                {item.icon}<span>{item.title}</span>
                            </div>
                        ))}
                    </div>

                    <div className="fixed top-0 right-0 w-64 h-[calc(100%-40px)] win98-window border-l-2 p-2 flex flex-col gap-4 shadow-xl z-50">
                        <div className="bg-[#000080] text-white text-[11px] p-1 font-bold italic text-center">Channel_Bar</div>
                        
                        <div className="bg-white border-2 border-gray-600 p-2 shadow-inner flex flex-col">
                            <div className="w-full aspect-square border-2 border-black mb-2 overflow-hidden">
                                <img src="https://drive.google.com/thumbnail?id=1G8YoD3zGwTxS5n-SGWKDmHQwcKz4Q8rU&sz=w400" className="w-full h-full object-cover" />
                            </div>
                            <div className="text-[10px] font-bold text-center truncate mb-2 text-black">Parásito - Lady Viper</div>
                            {/* RUTA RELATIVA PARA EL AUDIO */}
                            <audio controls src="./Parasito_LadyViper.wav" className="w-full h-8 scale-90 origin-center"></audio>
                        </div>

                        <div className="flex flex-col gap-1">
                            <a href="https://instagram.com/luciaisabelpagan" target="_blank" className="win98-btn p-1 text-[10px] flex items-center gap-2 px-2">📸 INSTAGRAM</a>
                            <a href="https://youtube.com/@viajandosinguion" target="_blank" className="win98-btn p-1 text-[10px] flex items-center gap-2 px-2">📺 YOUTUBE</a>
                        </div>
                        <div className="flex-1 bg-white border-2 border-gray-600 p-2 overflow-y-auto text-[10px] font-mono text-gray-700">
                            > AutoCAD: Loaded<br/>> Player: Local Video<br/>> Trash: 5 Projects<br/>> Status: Ready
                        </div>
                    </div>

                    {windows.map(w => ( <MovableWindow key={w.id} {...w} isActive={activeId === w.id} onActivate={setActiveId} onClose={closeWin} /> ))}

                    {alertMsg && (
                        <div className="fixed inset-0 z-[9999] flex items-center justify-center bg-black/20 pointer-events-auto">
                            <div className="win98-window w-80 flex flex-col shadow-2xl border-2 border-white">
                                <div className="bg-[#000080] text-white p-1 font-bold text-xs flex justify-between items-center">
                                    <span className="ml-1">Alerta del Sistema</span>
                                    <button onClick={() => setAlertMsg(null)} className="win98-btn w-4 h-4 text-black text-xs font-bold leading-none flex justify-center items-center">×</button>
                                </div>
                                <div className="p-6 flex items-start gap-4 bg-[#c0c0c0]">
                                    <div className="text-4xl">⚠️</div>
                                    <p className="text-[11px] font-bold mt-1 leading-relaxed">{alertMsg}</p>
                                </div>
                                <div className="p-3 flex justify-center gap-4 bg-[#c0c0c0] border-t border-gray-400">
                                    <button onClick={() => setAlertMsg(null)} className="win98-btn px-6 py-1 text-xs font-bold">Aceptar</button>
                                    <button onClick={() => setAlertMsg(null)} className="win98-btn px-6 py-1 text-xs font-bold">Ignorar</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {isStartOpen && (
                        <div className="start-menu win98-window flex shadow-2xl pb-1 pr-1">
                            <div className="start-menu-sidebar text-sm font-sans tracking-widest pl-1 shadow-[inset_-1px_0_rgba(0,0,0,0.5)]">
                                Lucía <span className="font-normal">OS 98</span>
                            </div>
                            <div className="flex-1 bg-[#c0c0c0] flex flex-col text-black font-sans shadow-[inset_1px_1px_white]">
                                
                                <div className="py-1">
                                    <div className="px-2 py-[6px] hover:bg-[#000080] hover:text-white cursor-pointer text-[11px] flex items-center gap-3 group" 
                                         onClick={() => {openWin({id: 'acad', title: 'AutoCAD.exe', type: 'app'}); setIsStartOpen(false);}}>
                                        <div className="w-8 flex justify-center"><img src="https://drive.google.com/thumbnail?id=1ppXe5M8uk-1dQfWkLY9-GwF-vKxmzTYe&sz=w100" className="w-6 h-6 drop-shadow-md" /></div>
                                        <span><u>A</u>utoCAD</span>
                                    </div>
                                    <div className="px-2 py-[6px] hover:bg-[#000080] hover:text-white cursor-pointer text-[11px] flex items-center gap-3" 
                                         onClick={() => {openWin({id: 'paint', title: 'Paint.exe', type: 'app'}); setIsStartOpen(false);}}>
                                        <div className="w-8 flex justify-center text-2xl drop-shadow-md">🎨</div>
                                        <span><u>P</u>aint</span>
                                    </div>
                                    <div className="px-2 py-[6px] hover:bg-[#000080] hover:text-white cursor-pointer text-[11px] flex items-center gap-3" 
                                         onClick={() => {openWin({id: 'buscaminas', title: 'Buscaminas.exe', type: 'app'}); setIsStartOpen(false);}}>
                                        <div className="w-8 flex justify-center text-2xl drop-shadow-md">💣</div>
                                        <span><u>B</u>uscaminas</span>
                                    </div>
                                    <div className="px-2 py-[6px] hover:bg-[#000080] hover:text-white cursor-pointer text-[11px] flex items-center gap-3" 
                                         onClick={() => {openWin({id: 'syslog', title: 'System_Log.exe', type: 'app'}); setIsStartOpen(false);}}>
                                        <div className="w-8 flex justify-center text-2xl drop-shadow-md">🖧</div>
                                        <span><u>S</u>ystem Log</span>
                                    </div>
                                </div>

                                <div className="h-px bg-[#848484] mx-1 border-b border-white my-1"></div>
                                
                                <div className="py-1">
                                    <div className="px-2 py-1 text-[11px] flex items-center justify-between cursor-default group relative text-gray-800 font-bold">
                                        <div className="flex items-center gap-3">
                                            <div className="w-8 flex justify-center text-xl drop-shadow-md">⚙️</div>
                                            <span><u>H</u>erramientas</span>
                                        </div>
                                        <span className="text-[8px]">▶</span>
                                    </div>
                                    
                                    <div className="pl-12 py-[4px] hover:bg-[#000080] hover:text-white cursor-default text-[10px] flex items-center gap-2">
                                        <div className="w-4 h-4 bg-blue-600 text-cyan-200 border border-blue-800 flex items-center justify-center font-bold text-[8px] rounded-sm shadow-sm">Ps</div> 
                                        Adobe Photoshop
                                    </div>
                                    <div className="pl-12 py-[4px] hover:bg-[#000080] hover:text-white cursor-default text-[10px] flex items-center gap-2">
                                        <div className="w-4 h-4 bg-orange-600 text-orange-200 border border-orange-800 flex items-center justify-center font-bold text-[8px] rounded-sm shadow-sm">Ai</div> 
                                        Adobe Illustrator
                                    </div>
                                    <div className="pl-12 py-[4px] hover:bg-[#000080] hover:text-white cursor-default text-[10px] flex items-center gap-2">
                                        <div className="w-4 h-4 bg-purple-700 text-purple-200 border border-purple-900 flex items-center justify-center font-bold text-[8px] rounded-sm shadow-sm">Pr</div> 
                                        Adobe Premiere Pro
                                    </div>
                                    <div className="pl-12 py-[4px] hover:bg-[#000080] hover:text-white cursor-default text-[10px] flex items-center gap-2">
                                        <div className="w-4 h-4 bg-gray-800 text-white border border-black flex items-center justify-center font-bold text-[8px] rounded-sm shadow-sm">Rh</div> 
                                        Rhinoceros 3D
                                    </div>
                                </div>
                                
                                <div className="h-px bg-[#848484] mx-1 border-b border-white my-1 mt-auto"></div>
                                
                                <div className="py-1 pb-2">
                                    <div className="px-2 py-[6px] hover:bg-[#000080] hover:text-white cursor-pointer text-[11px] flex items-center gap-3" 
                                         onClick={() => {window.open('mailto:luciaisabelpagan@gmail.com'); setIsStartOpen(false);}}>
                                        <div className="w-8 flex justify-center text-xl drop-shadow-md">✉️</div>
                                        <span><u>C</u>ontacto Directo</span>
                                    </div>
                                </div>

                            </div>
                        </div>
                    )}

                    <div className="fixed bottom-0 left-0 right-0 h-10 win98-window border-t-2 border-white flex items-center px-1 z-[1000]">
                        <button onClick={(e) => { e.stopPropagation(); setIsStartOpen(!isStartOpen); }} className={`win98-btn px-2 h-7 flex items-center gap-1 font-bold text-sm italic ${isStartOpen ? 'active' : ''}`}>Inicio</button>
                        <div className="w-px h-6 bg-gray-600 mx-2 border-r border-white"></div>
                        <div className="flex gap-1 flex-1 overflow-x-auto no-scrollbar">
                            {windows.map(w => ( <button key={w.id} onClick={() => setActiveId(w.id)} className={`win98-btn px-2 h-7 text-[10px] min-w-[80px] max-w-[140px] truncate ${activeId === w.id ? 'active font-bold' : ''}`}>{w.title}</button> ))}
                        </div>
                        <div className="bg-[#c0c0c0] border-2 border-gray-600 px-3 h-7 flex items-center gap-2 font-mono text-[11px] shadow-inner">🔊{new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</div>
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
